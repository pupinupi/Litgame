<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Литвин. Путь к хайпу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= ЛОББИ ================= -->

<div id="lobbyScreen" class="screen">
    <h1>Литвин. Путь к хайпу</h1>

    <div class="nameBox">
        <input id="playerName" placeholder="Ваше имя">
    </div>

    <p class="chooseTitle">Выберите фишку:</p>

    <div class="pieces">
        <div class="piece" data-color="red" style="background:#ff4d4d"></div>
        <div class="piece" data-color="blue" style="background:#3da0ff"></div>
        <div class="piece" data-color="green" style="background:#39ff83"></div>
        <div class="piece" data-color="purple" style="background:#c83dff"></div>
    </div>

    <button id="createRoom" class="btn">Создать комнату</button>

    <div class="joinBox">
        <input id="joinInput" placeholder="Код комнаты">
        <button id="joinRoom" class="btn">Войти</button>
    </div>

    <div id="roomCode" class="roomCode"></div>

    <h3>Игроки в комнате:</h3>
    <div id="playersList" class="playersList"></div>

    <button id="startGame" class="btn hidden startBtn">Начать игру</button>
</div>


<!-- ================= ИГРА ================= -->

<div id="gameScreen" class="screen hidden">

    <div class="top-panel">
        <div class="turnInfo">Ход игрока: <span id="turnName"></span></div>

        <div class="hypeBar">
            <div id="hypeFill"></div>
        </div>

        <div class="totalHype">Твой хайп: <span id="myHype">0</span></div>
    </div>

    <div class="board-container">
        <img src="board.png" class="board">

        <!-- Здесь появляются фишки -->
        <div id="tokens"></div>
    </div>

    <button id="rollBtn" class="rollBtn">Бросить кубик</button>
    <div id="diceNumber" class="diceNumber"></div>
</div>


<!-- ================= POPUP: СКАНДАЛ ================= -->

<div id="scandalPopup" class="popup hidden">
    <div class="popup-inner scandal-card">
        <h2>Скандал</h2>
        <p id="scandalText"></p>
        <button onclick="UI.closeScandal()" class="btn">OK</button>
    </div>
</div>


<!-- ================= POPUP: РИСК ================= -->

<div id="riskPopup" class="popup hidden">
    <div class="popup-inner risk-card">
        <h2>Риск</h2>
        <p>1–3 → −5 хайпа<br>4–6 → +5 хайпа</p>

        <button id="riskRollBtn" class="btn">Кинуть кубик</button>
        <div id="riskResult" class="riskResult"></div>
    </div>
</div>


<!-- Подключение Socket.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<!-- Логика -->
<script src="lobby.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>

</body>
</html>
