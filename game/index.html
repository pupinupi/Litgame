<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Литвин: Путь к Хайпу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobbyScreen" class="screen">
    <h1>Лобби</h1>
    <div id="roomCode"></div>

    <div class="choose-piece">
        <p>Выберите фишку:</p>
        <div class="pieces">
            <div class="piece" data-color="red" style="background:#ff4d4d"></div>
            <div class="piece" data-color="blue" style="background:#3ca0ff"></div>
            <div class="piece" data-color="green" style="background:#3dff6b"></div>
            <div class="piece" data-color="purple" style="background:#c03cff"></div>
        </div>
    </div>

    <button id="createRoom">Создать комнату</button>
    <input id="joinInput" placeholder="Код комнаты">
    <button id="joinRoom">Войти</button>

    <div id="playersList"></div>
    <button id="startGame" class="hidden">Начать игру</button>
</div>


<!-- ИГРА -->
<div id="gameScreen" class="screen hidden">

    <div class="top-panel">
        <div class="turnInfo">Ход игрока: <span id="turnName"></span></div>
        <div class="hypeBar">
            <div id="hypeFill"></div>
        </div>
        <div class="totalHype">Твой хайп: <span id="myHype">0</span></div>
    </div>

    <div class="board-container">
        <img src="board.png" class="board" />

        <div id="tokens"></div>
    </div>

    <button id="rollBtn">Бросить кубик</button>
    <div id="diceNumber"></div>
</div>


<!-- POPUP: СКАНДАЛ -->
<div id="scandalPopup" class="popup hidden">
    <div class="popup-inner">
        <h2>СКАНДАЛ!</h2>
        <p id="scandalText"></p>
        <button onclick="UI.closeScandal()">OK</button>
    </div>
</div>

<!-- POPUP: РИСК -->
<div id="riskPopup" class="popup hidden">
    <div class="popup-inner">
        <h2>РИСК!</h2>
        <p>1–3 → −5 хайп<br>4–6 → +5 хайп</p>
        <button id="riskRollBtn">Бросить</button>
        <div id="riskResult"></div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="lobby.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>

</body>
</html>
