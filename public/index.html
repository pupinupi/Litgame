<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="lobby">

  <h1>🔥 ЛИТВИН: ПУТЬ К ХАЙПУ 🔥</h1>

  <input id="username" placeholder="Имя">
  <input id="roomCode" placeholder="Код комнаты">

  <div class="chips">
    <div class="chip" data-color="red" style="background:red"></div>
    <div class="chip" data-color="blue" style="background:blue"></div>
    <div class="chip" data-color="yellow" style="background:yellow"></div>
    <div class="chip" data-color="purple" style="background:purple"></div>
  </div>

  <button id="joinBtn">ВОЙТИ</button>
  <button id="startBtn">НАЧАТЬ</button>

  <div id="playersList"></div>

  <div class="rules">
    <h3>🎮 Правила</h3>
    <p>Цель: набрать 70 хайпа</p>
    <p>🔁 Круг: +7</p>
    <p>🚀 Старт: +10</p>
    <p>💥 Скандал: -1…-5</p>
    <p>🎲 Риск: 1-3 = -5 | 4-6 = +5</p>
    <p>🛑 Суд: пропуск хода</p>
  </div>

</div>

<div id="game">

  <div id="hypeBars"></div>

  <div id="gameBoard"></div>

  <div id="controls">
    <button id="rollBtn">🎲 Бросить кубик</button>
    <div id="diceResult"></div>
  </div>

</div>

<div id="modal"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
