<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🔥 Литвин: Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>
<body>

<div id="lobby">
  <h1>🔥 ЛИТВИН: ПУТЬ К ХАЙПУ 🔥</h1>

  <input id="username" placeholder="Имя">
  <input id="roomCode" placeholder="Код комнаты">

  <div>
    <button class="chip" data-color="red"></button>
    <button class="chip" data-color="blue"></button>
    <button class="chip" data-color="yellow"></button>
    <button class="chip" data-color="purple"></button>
  </div>

  <button id="joinBtn">ВОЙТИ</button>
  <button id="startBtn">НАЧАТЬ</button>

  <div id="playersList"></div>
</div>

  <div style="max-width:400px; margin-top:20px; font-size:18px;">
  📜 Правила:<br>
  • Бросай кубик<br>
  • Двигайся по клеткам<br>
  • Скандалы уменьшают хайп<br>
  • Риск даёт случайный результат<br>
  • Собери 70 хайпа и победи 🏆
</div>
  
<div id="game" style="display:none">

  <h2 id="turnText"></h2>

  <div id="gameBoard">
    <img src="board.jpg">
  </div>

  <button id="rollBtn">🎲 БРОСИТЬ</button>

  <div id="diceResult"></div>
  <div id="hypeBars"></div>

</div>

<div id="modal"></div>

</body>
</html>
