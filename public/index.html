<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🔥 Литвин</title>
<link rel="stylesheet" href="style.css">

<script src="socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>

<body>

<div id="lobby">
  <h1>🔥 ЛИТВИН</h1>

  <input id="username" placeholder="Имя">
  <input id="roomCode" placeholder="Комната">

  <div class="chips">
    <div class="chip" data-color="red"></div>
    <div class="chip" data-color="blue"></div>
    <div class="chip" data-color="yellow"></div>
    <div class="chip" data-color="purple"></div>
  </div>

  <button id="joinBtn">ВОЙТИ</button>
  <button id="startBtn">СТАРТ</button>

  <div id="playersList"></div>

  <div class="rules">
    <p>🎲 Бросай кубик</p>
    <p>🔥 70 хайпа — победа</p>
  </div>
</div>

<div id="game">
  <div id="hypeBars"></div>

  <div id="board"></div>

  <div id="dice"></div>
  <button id="rollBtn">🎲</button>
</div>

</body>
</html>
