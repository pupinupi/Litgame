<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Литвин. Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>
<body>

<div id="lobby">
  <h1>🔥 Литвин: Путь к хайпу 🔥</h1>
  <input type="text" id="username" placeholder="Ваше имя">
  <input type="text" id="roomCode" placeholder="Код комнаты">

  <div>
    <div class="lobbyBox">
  <!-- тут все твои поля -->
</div>
    
    <span>Выберите фишку:</span>
    <button class="chip" data-color="red"></button>
    <button class="chip" data-color="blue"></button>
    <button class="chip" data-color="yellow"></button>
    <button class="chip" data-color="purple"></button>
  </div>

  <button id="joinBtn">Войти</button>
  <button id="startBtn">Начать игру</button>

  <div id="playersList"></div>
</div>

<div id="game" style="display:none">
  <h2 id="turnText"></h2>

  <div id="gameBoard">
    <img src="board.jpg" width="1024" height="1024">
  </div>

  <button id="rollBtn">🎲 Бросить кубик</button>

  <div id="diceResult"></div>
  <div id="hypeBars"></div>
  <div id="log"></div>
</div>

<!-- Модальные окна -->
<div id="modal" class="hidden"></div>

</body>
</html>
