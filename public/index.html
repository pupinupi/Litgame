<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Игра</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby">
  <h1>🔥 ЛОББИ</h1>

  <input id="name" placeholder="Имя">

  <div id="skins">
    <div class="skin red selected" onclick="selectSkin('red',this)"></div>
    <div class="skin blue" onclick="selectSkin('blue',this)"></div>
    <div class="skin yellow" onclick="selectSkin('yellow',this)"></div>
    <div class="skin purple" onclick="selectSkin('purple',this)"></div>
  </div>

  <button onclick="createRoom()">Создать</button>
  <input id="roomInput" placeholder="Код">
  <button onclick="joinRoom()">Войти</button>

  <h3 id="roomCode"></h3>
  <div id="playersList"></div>

  <button id="startBtn" onclick="startGame()">НАЧАТЬ</button>

  <div id="rules">
    🎯 Цель: 70 хайпа<br>
    🎲 Ходы по очереди<br>
    ⚠ Скандал = минус<br>
    🎰 Риск = шанс +/-5
  </div>
</div>

<div id="game" class="hidden">

  <img src="board.jpg" id="board">
  <div id="tokens"></div>

  <div id="topUI">
    <div id="turn"></div>
    <div id="hypeBar"><div id="hypeFill"></div></div>
    <div id="hype"></div>
  </div>

  <div id="bottomUI">
    <button onclick="roll()">🎲</button>
    <div id="dice"></div>
  </div>

</div>

<div id="modal" class="hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
