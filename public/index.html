<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🔥 Литвин: Путь к хайпу</title>
<link rel="stylesheet" href="style.css">

<!-- ❗ важно без / -->
<script src="socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>

<body>

<!-- ЛОББИ -->
<div id="lobby">
  <h1>🔥 ЛИТВИН: ПУТЬ К ХАЙПУ 🔥</h1>

  <input id="username" placeholder="Имя">
  <input id="roomCode" placeholder="Код комнаты">

  <div class="chips">
    <div class="chip" data-color="red"></div>
    <div class="chip" data-color="blue"></div>
    <div class="chip" data-color="yellow"></div>
    <div class="chip" data-color="purple"></div>
  </div>

  <div class="buttons">
    <button id="joinBtn">ВОЙТИ</button>
    <button id="startBtn">НАЧАТЬ</button>
  </div>

  <!-- 👇 ИГРОКИ -->
  <div id="playersList"></div>
</div>

<!-- ИГРА -->
<div id="game" style="display:none; flex-direction:column; align-items:center;">

  <div id="hypeBars"></div>

  <div id="gameBoard">
    <img src="board.jpg">
  </div>

  <div id="diceResult"></div>
  <button id="rollBtn">🎲 БРОСИТЬ</button>

</div>

<div id="modal"></div>

</body>
</html>
