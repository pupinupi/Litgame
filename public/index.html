<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🔥 Литвин: Путь к хайпу</title>

<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>
<body>

<!-- ЛОББИ -->
<div id="lobby">
  <h1 class="title">🔥 ЛИТВИН: ПУТЬ К ХАЙПУ 🔥</h1>

  <!-- ⚠️ ВАЖНО: ID ИСПРАВЛЕНЫ -->
  <input id="name" placeholder="Имя">
  <input id="roomInput" placeholder="Код комнаты">

  <div class="chips">
    <div class="chip red selected" data-color="red"></div>
    <div class="chip blue" data-color="blue"></div>
    <div class="chip yellow" data-color="yellow"></div>
    <div class="chip purple" data-color="purple"></div>
  </div>

  <!-- 🔥 ОДНА КНОПКА -->
  <div class="buttons">
    <button id="joinBtn">ВОЙТИ</button>
  </div>

  <!-- СТАРТ ТОЛЬКО У ХОСТА -->
  <button id="startBtn" style="display:none;">🚀 НАЧАТЬ ИГРУ</button>

  <div id="roomCodeDisplay"></div>
  <div id="playersList"></div>

  <div class="rules">
    <h2>📜 Правила</h2>
    <p>🎲 Бросай кубик</p>
    <p>🔥 Собери 70 хайпа</p>
    <p>💥 Скандалы уменьшают хайп</p>
    <p>⚠️ Риск: +5 или -5</p>
    <p>🛑 Суд: пропуск хода</p>
  </div>
</div>

<!-- ИГРА -->
<div id="game" style="display:none;">
  <div id="hypeBars"></div>

  <div id="gameBoard">
    <img src="board.jpg">
  </div>

  <div id="diceResult"></div>

  <button id="rollBtn">🎲 БРОСИТЬ</button>
</div>

<!-- МОДАЛКА -->
<div id="modal"></div>

</body>
</html>
