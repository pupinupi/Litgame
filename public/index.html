<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Литвин. Путь к хайпу — Лобби</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script defer src="client.js"></script>
</head>
<body>
<h1>Литвин. Путь к хайпу</h1>

<div id="lobby">
  <input type="text" id="username" placeholder="Ваше имя">
  <input type="text" id="roomCode" placeholder="Код комнаты">
  <label>Выберите фишку:</label>
  <select id="colorSelect">
    <option value="yellow">Желтая</option>
    <option value="red">Красная</option>
    <option value="blue">Синяя</option>
    <option value="purple">Фиолетовая</option>
  </select>
  <button id="joinBtn">Войти</button>
</div>

<div id="playersList"></div>
