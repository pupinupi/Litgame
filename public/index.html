<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Литвин: Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>
<body>

<!-- ЛОББИ -->
<div id="lobby">
  <h1>🔥ЛИТВИН: ПУТЬ К ХАЙПУ🔥</h1>

  <input id="name" placeholder="Имя">
  <input id="room" placeholder="Код комнаты">

  <div id="skins">
    <div class="skin red selected"></div>
    <div class="skin blue"></div>
    <div class="skin yellow"></div>
    <div class="skin purple"></div>
  </div>

  <div class="buttons">
    <button id="join">ВОЙТИ</button>
    <button id="start">🚀 НАЧАТЬ</button>
  </div>

  <div id="roomCode"></div>
  <div id="players"></div>
</div>

<!-- ИГРА -->
<div id="game" style="display:none;">

  <div id="hypeBars"></div>

  <div id="board">
    <img src="board.jpg">
  </div>

  <button id="roll">🎲 БРОСИТЬ</button>
  <div id="dice"></div>
</div>

<!-- МОДАЛ -->
<div id="modal"></div>

<!-- ПОБЕДА -->
<div id="winScreen"></div>

</body>
</html>
