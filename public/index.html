<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Литвин</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby">

  <h1 class="title">🔥 ЛИТВИН: ПУТЬ К ХАЙПУ 🔥</h1>

  <input id="name" placeholder="Имя">
  <input id="roomInput" placeholder="Код комнаты">

  <!-- ФИШКИ -->
  <div id="skins">
    <div class="skin red selected" onclick="selectSkin('red', this)"></div>
    <div class="skin blue" onclick="selectSkin('blue', this)"></div>
    <div class="skin yellow" onclick="selectSkin('yellow', this)"></div>
    <div class="skin purple" onclick="selectSkin('purple', this)"></div>
  </div>

  <div class="buttons">
    <button onclick="joinRoom()">ВОЙТИ</button>
    <button onclick="createRoom()">СОЗДАТЬ</button>
  </div>

  <div id="roomCodeDisplay"></div>
  <div id="playersList"></div>

  <button id="startBtn" onclick="startGame()">🚀 НАЧАТЬ</button>

  <div id="rules">
    <h3>🎮 Правила игры</h3>
    <p>🔥 Цель: первым набрать 70 хайпа</p>
    <p>🎲 Бросай кубик и двигайся</p>
    <p>📊 Шкала сверху показывает хайп</p>
    <p>➕ Клетки дают хайп</p>
    <p>💥 Скандал: -1…-5</p>
    <p>🎰 Риск: 1–3 = -5 | 4–6 = +5</p>
    <p>🚫 Блок: -10 хайпа</p>
    <p>⛔ Пропуск: пропусти ход</p>
    <p>🏆 70 хайпа = победа</p>
  </div>

</div>

<div id="game" class="hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
