<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Литвин. Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>
<body>

<div id="lobby">
  <h1>Лобби</h1>
  <input type="text" id="username" placeholder="Ваше имя">
  <input type="text" id="roomCode" placeholder="Код комнаты">
  <div>
    <span>Выберите фишку:</span>
    <button class="chip" data-color="red" style="background:red"></button>
    <button class="chip" data-color="blue" style="background:blue"></button>
    <button class="chip" data-color="yellow" style="background:yellow"></button>
    <button class="chip" data-color="purple" style="background:purple"></button>
  </div>
  <button id="joinBtn">Войти</button>
  <button id="startBtn">Начать игру</button>
  <div id="playersList"></div>
</div>

<div id="game" style="display:none">
  <h2>Поле</h2>
  <div id="gameBoard">
    <img src="board.jpg" width="1024" height="1024">
  </div>
  <button id="rollBtn">Бросить кубик</button>
  <div id="hypeBars"></div>
  <div id="log"></div>

  <div id="coordPanel" style="margin-top:20px; border:1px solid #ccc; padding:10px;">
    <h3>Сбор координат клеток</h3>
    <button id="startCoord">Начать сбор</button>
    <button id="stopCoord">Закончить сбор</button>
    <button id="showCoord">Показать координаты</button>
    <div id="coordList" style="margin-top:10px; max-height:150px; overflow:auto; border:1px solid #eee; padding:5px;"></div>
  </div>
</div>

</body>
</html>
