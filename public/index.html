<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Литвин: Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script defer src="app.js"></script>
</head>
<body>

<div id="lobby">
  <h1>💜 ЛИТВИН: ПУТЬ К ХАЙПУ</h1>

  <input id="name" placeholder="Введите имя">
  <input id="room" placeholder="Код комнаты (пусто = создать)">

  <div id="skins">
    <div class="skin red selected"></div>
    <div class="skin blue"></div>
    <div class="skin yellow"></div>
    <div class="skin purple"></div>
  </div>

  <button id="join">🎮 ВОЙТИ</button>

  <div id="roomCode"></div>
  <div id="players"></div>

  <button id="start" style="display:none;">🚀 НАЧАТЬ ИГРУ</button>
</div>

<div id="game" style="display:none;">
  <div id="hypeBars"></div>

  <div id="board">
    <img src="board.jpg">
  </div>

  <button id="roll">🎲 БРОСИТЬ</button>
  <div id="dice"></div>
</div>

<div id="modal"></div>

</body>
</html>
