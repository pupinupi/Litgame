<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Литвин: Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby">
  <h1>🔥 ЛОББИ</h1>

  <input id="name" placeholder="Имя">

  <div>
    <button onclick="createRoom()">Создать комнату</button>
    <input id="roomInput" placeholder="Код комнаты">
    <button onclick="joinRoom()">Войти</button>
  </div>

  <h3 id="roomCode"></h3>

<div id="skins">
  <div class="skin red selected" onclick="selectSkin('red', this)"></div>
  <div class="skin blue" onclick="selectSkin('blue', this)"></div>
  <div class="skin yellow" onclick="selectSkin('yellow', this)"></div>
  <div class="skin purple" onclick="selectSkin('purple', this)"></div>
</div>
  
  <div id="playersList"></div>

  <button onclick="startGame()" id="startBtn" style="display:none;">
    🚀 НАЧАТЬ
  </button>
</div>

<!-- ИГРА -->
<div id="game" class="hidden">

  <img src="board.jpg" id="board">

  <div id="tokens"></div>

  <div id="topUI">
    <div id="turn"></div>

    <div id="hypeBar">
      <div id="hypeFill"></div>
    </div>

    <div id="hype"></div>
  </div>

  <div id="bottomUI">
    <button onclick="roll()">🎲 БРОСИТЬ</button>
    <div id="dice"></div>
  </div>

</div>

<div id="modal" class="hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
