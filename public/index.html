<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Литвин игра</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="lobby">
  <input id="name" placeholder="Имя">
  <button onclick="join()">Играть</button>
</div>

<div id="game">
  <img src="board.jpg" id="board">

  <div id="tokens"></div>

  <div id="topUI">
    <div id="turn"></div>
    <div id="hypeBar"><div id="hypeFill"></div></div>
    <div id="hype"></div>
  </div>

  <div id="bottomUI">
    <button onclick="roll()">🎲 БРОСИТЬ</button>
    <div id="dice"></div>
  </div>
</div>

<div id="modal" class="hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
